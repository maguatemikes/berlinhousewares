# Cloudflare Workers config for the Berlin Houseware Hydrogen app.
# `npm run build` (shopify hydrogen build) emits a Workers module at
# dist/server/index.js plus browser assets in dist/client.
#
# Deploy:  npm run deploy            (local CLI)
#   or:    connect this repo in Cloudflare > Workers & Pages > Create > Import
#          a repository  (Workers Builds auto-deploys on every push to main).

name = "berlinhousewares"
main = "dist/server/index.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare serves these files directly; any request that doesn't match a
# static file falls through to the Worker for server-side rendering.
[assets]
directory = "./dist/client"
binding = "ASSETS"

# --- Runtime environment variables (DO NOT hardcode tokens here) ---
# This file is committed to git, so set the values in the Cloudflare dashboard
# (Workers & Pages > berlinhousewares > Settings > Variables and Secrets),
# or via `npx wrangler secret put <NAME>`:
#   SESSION_SECRET                          (mark as Secret)
#   PUBLIC_STORE_DOMAIN                      = berlinhousewares-com.myshopify.com
#   PUBLIC_STOREFRONT_API_TOKEN             = <public storefront token>
#   PUBLIC_CUSTOMER_ACCOUNT_API_CLIENT_ID   = e0f0d158-9467-4df6-a9b3-1d2be432fcbb
#   PUBLIC_CUSTOMER_ACCOUNT_API_URL         = https://shopify.com/authentication/71626096792
