# Cloudflare Workers config for the Berlin Houseware Hydrogen app.
# `npm run build` (shopify hydrogen build) emits a Workers module at
# dist/server/index.js plus browser assets in dist/client.
#
# Deploy:  npm run deploy            (local CLI)
#   or:    connect this repo in Cloudflare > Workers & Pages > Create > Import
#          a repository  (Workers Builds auto-deploys on every push to main).

name = "berlinhousewares"
main = "dist/server/index.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare serves these files directly; any request that doesn't match a
# static file falls through to the Worker for server-side rendering.
[assets]
directory = "./dist/client"
binding = "ASSETS"

# Public (browser-exposed) env vars — safe to commit. `wrangler deploy` (run by
# Workers Builds) applies ONLY what's here and wipes dashboard-set plain vars,
# so they must live in this file to survive each deploy.
[vars]
PUBLIC_STORE_DOMAIN = "berlinhousewares-com.myshopify.com"
PUBLIC_STOREFRONT_API_TOKEN = "93f257f7a4678e1bf9f2346816a53f00"
PUBLIC_CUSTOMER_ACCOUNT_API_CLIENT_ID = "e0f0d158-9467-4df6-a9b3-1d2be432fcbb"
PUBLIC_CUSTOMER_ACCOUNT_API_URL = "https://shopify.com/authentication/71626096792"
# Hydrogen builds the customer-account OAuth URL from SHOP_ID (not the URL above);
# without it the authorize URL becomes /authentication/undefined -> Shopify 404.
SHOP_ID = "71626096792"

# SESSION_SECRET is a real secret — do NOT put it here. Set it as an encrypted
# Secret in the dashboard, or `npx wrangler secret put SESSION_SECRET`.
# Secrets DO persist across `wrangler deploy` (unlike plain dashboard vars).
